<!-- write one JSON string with date property and print date in 
indian standard time while clicking on button -->
<!-- same as a 1.js file question -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        function call()
        {
            obj=JSON.parse('{"name":"abc","dob":"1994-04-30"}');
            obj=new Date(obj.dob);
            document.getElementById("demo").innerHTML=obj;

        }
    </script>
</head>
<body>
    <p id="demo"></p>
    <button onclick="call()">click me</button>
</body>
</html>
