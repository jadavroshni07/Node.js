<!-- Write a Code to increse the font size at interval of 50 milisec and 
 it should stop incresing when the font size reached to 50px
 this task should be perform when you click on incese button on browser 
 default font size (15px)-->
 <!DOCTYPE html>
 <html lang="en">
 <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
 </head>
 <body>
    <p id="p1">Roshni</p>
    <button onclick="fun1()">Increse</button>
    <script>
        let font=15;
        function fun1(){
            setInterval(function()
        {
            if(font<100){
                fun(font++)
            }
        },50)
        };
        function fun(size){
            document.getElementById("p1").style.fontSize=size+"px"
        }
    </script>
 </body>
 </html>
